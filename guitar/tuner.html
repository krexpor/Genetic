<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang="tuner-title">Тюнер | Krexpor</title>
    
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WPCS9G55D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0WPCS9G55D');
    </script>
    <script src="/cookies.js" defer></script>
    <script src="/lang.js" defer></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3441784725346884" crossorigin="anonymous"></script>

    <script src="https://unpkg.com/pitchfinder@2.3.0/dist/pitchfinder.min.js"></script>

    <style>
        .tuner-display { text-align: center; margin: 20px 0; }
        
        /* Стили для статуса (Тяни/Ослабь/Идеально) */
        .tune-status { font-size: 2.5rem; font-weight: bold; color: #da3633; margin-bottom: 5px; transition: color 0.2s; }
        .tune-status.perfect { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .freq-display { color: #8b949e; font-size: 14px; margin-bottom: 20px; font-family: monospace; }

        /* Блок выбора струн */
        .strings-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
            background: #111318;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        .string-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #30363d;
            background: transparent;
            color: #8b949e;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-direction: column;
            line-height: 1.1;
        }
        .string-btn span { font-size: 10px; font-weight: normal; opacity: 0.7; }
        .string-btn:hover { border-color: #8b949e; color: #f8fafc; }
        .string-btn.active {
            border-color: #da3633;
            color: white;
            background: rgba(218, 54, 51, 0.15);
            box-shadow: 0 0 15px rgba(218, 54, 51, 0.3);
            transform: scale(1.1);
        }

        /* Шкала тюнера */
        .tuner-scale { margin: 30px 0; position: relative; }
        .scale-labels { display: flex; justify-content: space-between; color: #8b949e; font-size: 12px; margin-bottom: 8px; font-weight: 600; }
        .meter { height: 12px; background: #30363d; border-radius: 6px; position: relative; overflow: hidden; }
        .meter::after { /* Центральная метка идеального звука */
            content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.2); transform: translateX(-50%);
        }
        .needle { 
            height: 100%; width: 6px; background: #da3633; border-radius: 3px;
            position: absolute; left: 50%; transition: left 0.1s ease-out, background-color 0.2s;
            box-shadow: 0 0 10px #da3633;
            transform: translateX(-50%);
        }
        .needle.perfect { background: #10b981; box-shadow: 0 0 10px #10b981; }
    </style>
</head>
<body>

    <div class="calculator-card">
        <a href="index.html" class="back-link" data-lang="back-menu">← Назад в меню</a>
        <h2 data-lang="tuner-h2">🎸 Гитарный тюнер</h2>
        
        <p style="text-align: center; color: #8b949e; font-size: 14px; margin-top: 5px;" data-lang="tuner-select-string">Выберите струну для настройки:</p>

        <div class="strings-container">
            <div class="string-btn active" onclick="selectString(82.41, this)">E<span>6</span></div>
            <div class="string-btn" onclick="selectString(110.00, this)">A<span>5</span></div>
            <div class="string-btn" onclick="selectString(146.83, this)">D<span>4</span></div>
            <div class="string-btn" onclick="selectString(196.00, this)">G<span>3</span></div>
            <div class="string-btn" onclick="selectString(246.94, this)">B<span>2</span></div>
            <div class="string-btn" onclick="selectString(329.63, this)">E<span>1</span></div>
        </div>

        <div class="tuner-display">
            <div id="tune-status" class="tune-status">--</div>
            <div id="freq-display" class="freq-display">0 Hz</div>
            
            <div class="tuner-scale">
                <div class="scale-labels">
                    <span data-lang="tuner-flat">Низко</span>
                    <span data-lang="tuner-perfect-label">Точно</span>
                    <span data-lang="tuner-sharp">Высоко</span>
                </div>
                <div class="meter"><div id="needle" class="needle"></div></div>
            </div>
        </div>
        
        <button onclick="startTuner()" class="btn" id="tuner-btn" data-lang="tuner-start">Включить микрофон 🎙️</button>
        <p style="font-size: 11px; color: #475569; text-align: center; margin-top: 15px;">
            <span data-lang="tuner-note">Доступ нужен только для анализа звука в реальном времени.</span>
        </p>
    </div>

    <script>
        let isRunning = false;
        let audioCtx;
        // По умолчанию выбрана 6-я струна E (Ми)
        let targetFreq = 82.41; 

        // Словари для статусов (так как они меняются динамически, мы задаем их тут)
        const dict = {
            up: { ru: "↑ Тяни", en: "↑ Tune Up" },
            down: { ru: "↓ Ослабь", en: "↓ Tune Down" },
            perfect: { ru: "✓ Идеально", en: "✓ Perfect" },
            waiting: { ru: "Сыграйте ноту...", en: "Play a string..." }
        };

        function selectString(freq, btn) {
            targetFreq = freq;
            document.querySelectorAll('.string-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Если тюнер еще не запущен, показываем прочерки
            if(!isRunning) return; 
            
            // СбрасываемUI
            document.getElementById('needle').style.left = '50%';
            updateStatusText('waiting');
        }

        function updateStatusText(statusType) {
            const lang = window.currentLang || 'ru'; // Берем текущий язык из вашей системы
            const statusEl = document.getElementById('tune-status');
            statusEl.innerText = dict[statusType][lang];
            
            if (statusType === 'perfect') {
                statusEl.classList.add('perfect');
                document.getElementById('needle').classList.add('perfect');
            } else {
                statusEl.classList.remove('perfect');
                document.getElementById('needle').classList.remove('perfect');
            }
        }

        async function startTuner() {
            if (isRunning) return;
            const btn = document.getElementById('tuner-btn');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                btn.innerText = (window.currentLang === 'en') ? "Listening... 🎧" : "Слушаю... 🎧";
                btn.style.backgroundColor = "#30363d";
                btn.style.color = "#8b949e";
                isRunning = true;

                updateStatusText('waiting');

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                
                const detectPitch = window.Pitchfinder.YIN({ sampleRate: audioCtx.sampleRate });
                const buffer = new Float32Array(analyser.fftSize);
                
                const freqDisplay = document.getElementById('freq-display');
                const needle = document.getElementById('needle');

                function update() {
                    analyser.getFloatTimeDomainData(buffer);
                    const pitch = detectPitch(buffer);
                    
                    if (pitch && pitch > 40 && pitch < 1000) { 
                        freqDisplay.innerText = pitch.toFixed(1) + " Hz";
                        
                        // Математика тюнера: вычисляем разницу в центах
                        let cents = 1200 * Math.log2(pitch / targetFreq);
                        
                        // Ограничиваем стрелку от -50 до +50 центов, чтобы она не улетала за экран
                        let leftPos = 50 + cents;
                        leftPos = Math.max(0, Math.min(100, leftPos));
                        needle.style.left = leftPos + "%";

                        // Логика цвета и текста
                        if (Math.abs(cents) < 5) { // Погрешность 5 центов считается идеальной
                            updateStatusText('perfect');
                        } else if (cents < -5) {
                            updateStatusText('up');
                        } else {
                            updateStatusText('down');
                        }
                    } 
                    requestAnimationFrame(update);
                }
                update();

            } catch (err) {
                alert("Ошибка доступа к микрофону. Разрешите его использование в браузере.");
            }
        }
    </script>
</body>
</html>
