<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генетический калькулятор роста</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-card">
        
        <a href="index.html" class="back-link">⬅ Назад в меню</a>

        <h2>Генетический калькулятор</h2>
        <p class="subtitle">Узнайте ориентировочный рост будущего ребенка на основе данных родителей</p>
        
        <hr>

        <div class="input-group">
            <label for="father">Рост отца (см):</label>
            <input type="number" id="father" value="196" placeholder="Например, 180">
        </div>

        <div class="input-group">
            <label for="mother">Рост матери (см):</label>
            <input type="number" id="mother" value="170" placeholder="Например, 165">
        </div>

        <div class="input-group">
            <label for="gender">Пол ребенка:</label>
            <select id="gender">
                <option value="boy">Мальчик</option>
                <option value="girl">Девочка</option>
            </select>
        </div>

        <button onclick="calculateHeight()">Рассчитать рост</button>

        <div id="result-box" class="result-box" style="display: none;">
            <h3>Прогнозируемый рост:</h3>
            <div id="final-height" class="highlight-value">-- см</div>
            <p class="note">Средняя погрешность составляет ±8.5 см из-за уникальной комбинации генов.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
