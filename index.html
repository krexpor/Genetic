<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krexpor | Projects</title>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WPCS9G55D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-0WPCS9G55D');
    </script>

    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: #111318; /* Темний фон як на вашому скріншоті */
            color: #f8fafc;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            background: #1a1d24; /* Колір самої картки */
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            position: relative; /* Важливо для позиціонування пташки */
            overflow: hidden; /* Обрізає пташку, якщо вона виходить за краї */
        }

        /* --- КОЛІБРІ ВСЕРЕДИНІ КАРТКИ --- */
        .bg-hummingbird {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; /* Розмір пташки відносно картки */
            opacity: 0.05; /* Ледь помітна, як водяний знак */
            pointer-events: none; 
            z-index: 0;
        }

        /* Обгортка для контенту, щоб він був ПОВЕРХ пташки */
        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        h1 { color: #f8fafc; margin-bottom: 8px; font-size: 1.8rem; }
        p { color: #8b949e; margin-bottom: 30px; font-size: 0.9rem; }
        
        .btn { 
            display: block; 
            padding: 14px; 
            margin: 12px 0; 
            background: #da3633; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600; 
            transition: all 0.3s ease; 
        }
        
        .btn:hover { 
            background: #b92b29; 
        }
        
        .social-links { 
            margin-top: 25px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
        }

        .social-link { 
            color: #8b949e; 
            text-decoration: none; 
            font-size: 0.85rem;
            padding: 8px 20px; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            transition: all 0.3s; 
        }

        .social-link:hover { 
            background: #30363d; 
            color: #fff; 
        }
        
        .footer { 
            margin-top: 30px; 
            font-size: 0.75rem; 
            color: #475569; 
            line-height: 1.6; 
        }
        .footer a { color: #475569; text-decoration: none; transition: 0.3s; }
        .footer a:hover { color: #8b949e; }

        /* Стилі для повідомлення Cookie */
        .cookie-toast {
            position: fixed;
            bottom: 20px;
            right: -400px;
            background: rgba(26, 28, 35, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 12px;
            width: 280px;
            z-index: 1000;
            transition: right 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.4s ease;
            opacity: 0;
            text-align: left;
        }

        .cookie-toast.show { right: 20px; opacity: 1; }
        .cookie-toast.hide { opacity: 0; right: -400px; }
        .cookie-toast p { color: #8b949e; font-size: 0.85rem; margin: 0 0 15px 0; line-height: 1.5; }
        .cookie-buttons { display: flex; gap: 15px; align-items: center; }
        
        .cookie-btn {
            background: transparent;
            color: #da3633;
            border: 1px solid #da3633;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .cookie-btn:hover { background: #da3633; color: #fff; }
        .cookie-link { color: #64748b; font-size: 0.8rem; text-decoration: none; }
        .cookie-link:hover { color: #f8fafc; }
    </style>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
</head>
<body>

    <div class="container">
        <svg class="bg-hummingbird" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M 35 45 Q 65 15 85 15 Q 70 30 55 50 Z" fill="#da3633" />
            <path d="M 20 40 Q 35 35 45 45 Q 55 55 60 80 Q 50 65 35 55 Q 25 50 20 40 Z" fill="#da3633" />
            <path d="M 45 55 Q 75 60 85 80 Q 65 70 50 65 Z" fill="#da3633" />
        </svg>

        <div class="content-wrapper">
            <h1>Krexpor</h1>
            <p>Проекты и жизнь 20-ти летнего парня</p>
            
            <a href="genetic/index.html" class="btn">🧬 Генетические калькуляторы</a>
            <a href="#" class="btn" style="background: #30363d; color: #8b949e; cursor: default;">🎸 Обучение (скоро)</a>
            
            <div class="social-links">
                <a href="https://www.youtube.com/@Krexpor" class="social-link" target="_blank">YouTube</a>
                <a href="https://t.me/krexpor" class="social-link" target="_blank">Telegram</a>
            </div>
            
            <div class="footer">
                © 2026 Krexpor <br>
                <a href="privacy.html" style="margin-top: 8px; display: inline-block;">Политика конфиденциальности</a>
            </div>
        </div>
    </div>

    <div id="cookie-toast" class="cookie-toast">
        <p>Мы используем немного cookies для аналитики Google. Никакой магии, только базовая статистика. 🍪</p>
        <div class="cookie-buttons">
            <button id="accept-cookies" class="cookie-btn">Ок, понятно</button>
            <a href="privacy.html" class="cookie-link">Подробнее</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const cookieToast = document.getElementById("cookie-toast");
            const acceptBtn = document.getElementById("accept-cookies");

            if (!localStorage.getItem("cookieAccepted")) {
                setTimeout(() => { cookieToast.classList.add("show"); }, 1000);
            }

            acceptBtn.addEventListener("click", function() {
                localStorage.setItem("cookieAccepted", "true");
                cookieToast.classList.remove("show");
                setTimeout(() => { cookieToast.style.display = 'none'; }, 500);
            });
        });
    </script>

</body>
</html>
