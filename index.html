<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krexpor | Projects</title>
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0f172a; 
            color: #f8fafc;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            border: 1px solid #334155;
        }
        h1 { color: #f8fafc; margin-bottom: 10px; letter-spacing: -0.5px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        
        .btn { 
            display: block; 
            padding: 15px; 
            margin: 12px 0; 
            background: #3b82f6; 
            color: white; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 600; 
            transition: all 0.3s ease; 
        }
        .btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        
        .social-links { margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        .social-link { 
            color: #94a3b8; 
            text-decoration: none; 
            font-weight: 500; 
            padding: 8px 16px; 
            border: 1px solid #334155; 
            border-radius: 8px; 
            transition: all 0.3s; 
        }
        .social-link:hover { background: #334155; color: #fff; }
        
        .footer { margin-top: 30px; font-size: 0.8em; color: #475569; }
    </style>
</head>
<body>
    <div class="container">

        <a href="genetic/index.html" class="btn">🧬 Генетичні калькулятори</a>
        <a href="#" class="btn" style="background: #475569;">🎸 Навчання (скоро)</a>
        
        <div class="social-links">
            <a href="https://www.youtube.com/@Krexpor" class="social-link" target="_blank">YouTube</a>
            <a href="https://t.me/krexpor" class="social-link" target="_blank">Telegram</a>
        </div>
        
        <div class="footer">© 2026 Krexpor</div>
    </div>
</body>
</html>
