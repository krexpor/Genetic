<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Левша или правша</title>
    <link rel="stylesheet" href="style.css">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WPCS9G55D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-0WPCS9G55D');
    </script>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    
</head>
<body>
    <div class="calculator-card">
        <a href="index.html" class="back-link">⬅ Назад в меню</a>
        
        <h2>Левша или правша?</h2>
        <p class="subtitle">Узнайте вероятность ведущей руки у ребенка</p>
        <hr>
        
        <div class="input-group">
            <label>Ведущая рука отца:</label>
            <select id="dad-hand">
                <option value="right">Правша</option>
                <option value="left">Левша</option>
            </select>
        </div>

        <div class="input-group">
            <label>Ведущая рука матери:</label>
            <select id="mom-hand">
                <option value="right">Правша</option>
                <option value="left">Левша</option>
            </select>
        </div>

        <button onclick="calculateHands()">Узнать вероятность</button>

        <div id="result-box" class="result-box" style="display: none;">
            <h3>Прогноз для ребенка:</h3>
            
            <div id="hand-result" style="margin-top: 15px; font-size: 16px; font-weight: bold; line-height: 1.8; text-align: left; display: inline-block;">
                </div>

            <div id="fact-box" style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #444; text-align: left; font-size: 13px; color: #a0a0a0; line-height: 1.5;">
                <b style="color: #fbbf24;">💡 Интересный факт:</b> <span id="fact-text"></span>
            </div>
        </div>
    </div>

    <script>
        // Статистическая матрица наследования рукости
        const handRules = {
            "right+right": "🫱 Правша: ~91%<br>🫲 Левша: ~9%",
            "right+left": "🫱 Правша: ~81%<br>🫲 Левша: ~19%",
            "left+right": "🫱 Правша: ~81%<br>🫲 Левша: ~19%",
            "left+left": "🫱 Правша: ~74%<br>🫲 Левша: ~26%"
        };

        const handFacts = [
            "Около 10% населения Земли — левши. Интересно, что среди мужчин леворукость встречается примерно на 23% чаще, чем среди женщин.",
            "Парадокс близнецов: Даже у абсолютно идентичных близнецов с одинаковой ДНК один может родиться правшой, а второй — левшой. Это доказывает, что на леворукость влияет не только генетика.",
            "Асимметрия мозга: У 95% правшей за речь отвечает левое полушарие. У левшей все сложнее: у 70% это также левое полушарие, у 15% — правое, а у 15% функции распределены поровну.",
            "Древняя пропорция: Археологи изучили сколы на каменных орудиях древних людей и выяснили, что соотношение левшей и правшей (10 к 90) остается неизменным последние 500 000 лет!"
        ];

        function calculateHands() {
            const dadH = document.getElementById("dad-hand").value;
            const momH = document.getElementById("mom-hand").value;
            const combo = dadH + "+" + momH;

            // Выводим результат
            document.getElementById("hand-result").innerHTML = handRules[combo];

            // Случайный факт
            const randomFact = handFacts[Math.floor(Math.random() * handFacts.length)];
            document.getElementById('fact-text').innerText = randomFact;

            // Показываем блок с анимацией
            document.getElementById("result-box").style.display = "block";
        }
    </script>
</body>
</html>
