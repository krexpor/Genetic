    <rect width="100" height="100" rx="20" fill="#0d1117" />
    
    <!-- Лінії (гілки) -->
    <line x1="25" y1="28" x2="25" y2="72" stroke="#f0f6fc" stroke-width="6" stroke-linecap="round" />
