<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Темний фон, який гармонійно виглядає у браузері -->
    <rect width="100" height="100" rx="22" fill="#0d1117" />
    
    <!-- Верхнє гостре крило -->
    <path d="M 35 45 Q 65 15 85 15 Q 70 30 55 50 Z" fill="#da3633" />
    
    <!-- Тіло та голова (спрямовані вліво-вниз) -->
    <path d="M 20 40 Q 35 35 45 45 Q 55 55 60 80 Q 50 65 35 55 Q 25 50 20 40 Z" fill="#da3633" />
    
    <!-- Нижнє крило -->
    <path d="M 45 55 Q 75 60 85 80 Q 65 70 50 65 Z" fill="#da3633" />
    
    <!-- Символ поруч із птахом (як на худі) -->
    <circle cx="22" cy="74" r="3.5" fill="#da3633" />
    <circle cx="30" cy="74" r="3.5" fill="#da3633" />
    <circle cx="26" cy="70" r="3.5" fill="#da3633" />
    <circle cx="26" cy="78" r="3.5" fill="#da3633" />
</svg>
