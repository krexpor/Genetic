    <line x1="45" y1="42" x2="70" y2="25" stroke="#f0f6fc" stroke-width="6" stroke-linecap="round" />
    <line x1="45" y1="58" x2="70" y2="75" stroke="#f0f6fc" stroke-width="6" stroke-linecap="round" />
    
    <!-- Вузли (коміти) -->
