<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена | Krexpor</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0b0c10;
            background-image: radial-gradient(circle at 50% 0%, #1a1c23 0%, #08090a 80%);
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Фоновый силуэт колибри */
        .bg-hummingbird {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin; /* Адаптивный огромный размер */
            height: 80vmin;
            opacity: 0.04; /* Едва заметный эффект тени/граффити */
            pointer-events: none; 
            z-index: 1;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 40px;
        }

        /* Неоновый мигающий эффект */
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            color: #0b0c10;
            text-shadow:
                0 0 5px #da3633,
                0 0 10px #da3633,
                0 0 20px #da3633,
                0 0 40px #da3633;
            animation: neon-flicker 3s infinite alternate;
            letter-spacing: 5px;
        }

        @keyframes neon-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow:
                    0 0 5px #da3633,
                    0 0 10px #da3633,
                    0 0 20px #da3633,
                    0 0 40px #da3633;
                color: #0b0c10;
            }
            20%, 24%, 55% {
                text-shadow: none;
                color: #1a1c23;
            }
        }

        h1 {
            color: #f8fafc;
            margin-top: 10px;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            color: #8b949e;
            margin-bottom: 40px;
            font-size: 1.1rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        /* Кнопка в уличном стиле */
        .btn {
            display: inline-block;
            padding: 14px 35px;
            background: transparent;
            color: #da3633;
            text-decoration: none;
            border: 2px solid #da3633;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(218, 54, 51, 0.1);
        }

        .btn:hover {
            background: #da3633;
            color: #0b0c10;
            box-shadow: 0 0 25px rgba(218, 54, 51, 0.6);
            transform: scale(1.05);
        }

        /* Легкий эффект уличной пыли на фоне */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, rgba(218,54,51,0.5), transparent),
                radial-gradient(1.5px 1.5px at 150px 170px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 250px 80px, rgba(218,54,51,0.4), transparent);
            background-repeat: repeat;
            background-size: 300px 300px;
            opacity: 0.4;
            z-index: 2;
        }
    </style>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WPCS9G55D"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-0WPCS9G55D');
</script>

    <script src="/cookies.js" defer></script>
    
</head>
<body>
    <svg class="bg-hummingbird" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M 35 45 Q 65 15 85 15 Q 70 30 55 50 Z" fill="#da3633" />
        <path d="M 20 40 Q 35 35 45 45 Q 55 55 60 80 Q 50 65 35 55 Q 25 50 20 40 Z" fill="#da3633" />
        <path d="M 45 55 Q 75 60 85 80 Q 65 70 50 65 Z" fill="#da3633" />
    </svg>

    <div class="particles"></div>
    
    <div class="container">
        <div class="error-code">404</div>
        <h1>Тупик</h1>
        <p>Похоже, вы свернули не в тот переулок. Этот маршрут больше не существует, либо вы заехали слишком далеко.</p>
        <a href="/index.html" class="btn">Вернуться на старт</a>
    </div>
</body>
</html>
