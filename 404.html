<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена | Krexpor</title>
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: radial-gradient(circle at center, #1e293b, #0a0f1a); 
            color: #f8fafc;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        
        /* Фон с эффектом сетки радара/матрицы */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .container { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(12px); 
            padding: 50px 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255,255,255,0.05); 
            text-align: center; 
            max-width: 450px; 
            width: 90%; 
            position: relative;
            z-index: 10;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
            position: relative;
        }

        /* Эффект легкого глитча */
        .error-code::before {
            content: '404';
            position: absolute;
            left: -2px;
            text-shadow: 2px 0 #ef4444;
            top: 0;
            color: transparent;
            background: inherit;
            -webkit-background-clip: text;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 50% 0); }
        }

        h1 { color: #e2e8f0; margin-top: 15px; font-size: 1.5rem; letter-spacing: 0.5px; }
        p { color: #94a3b8; margin-bottom: 35px; line-height: 1.6; }
        
        .btn { 
            display: inline-block; 
            padding: 14px 28px; 
            background: #3b82f6; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.3s ease; 
            border: 1px solid transparent;
        }
        .btn:hover { 
            background: rgba(59, 130, 246, 0.1); 
            color: #60a5fa;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px); 
        }
    </style>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Системная аномалия</h1>
        <p>Похоже, вы забрели на неизведанную территорию. Эта страница либо удалена, либо существует только в другой реальности.</p>
        
        <a href="/index.html" class="btn">Вернуться в безопасную зону</a>
    </div>
</body>
</html>
