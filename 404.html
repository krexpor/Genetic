<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сторінка не знайдена | Krexpor</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0b0c10;
            background-image: radial-gradient(circle at 50% 0%, #1a1c23 0%, #08090a 80%);
            color: #c5c6c7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 40px;
        }

        /* Неоновий ефект, що блимає */
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            color: #0b0c10;
            text-shadow:
                0 0 5px #da3633,
                0 0 10px #da3633,
                0 0 20px #da3633,
                0 0 40px #da3633;
            animation: neon-flicker 3s infinite alternate;
            letter-spacing: 5px;
        }

        @keyframes neon-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow:
                    0 0 5px #da3633,
                    0 0 10px #da3633,
                    0 0 20px #da3633,
                    0 0 40px #da3633;
                color: #0b0c10;
            }
            20%, 24%, 55% {
                text-shadow: none;
                color: #1a1c23;
            }
        }

        h1 {
            color: #f8fafc;
            margin-top: 10px;
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            color: #8b949e;
            margin-bottom: 40px;
            font-size: 1.1rem;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        /* Кнопка у вуличному стилі */
        .btn {
            display: inline-block;
            padding: 14px 35px;
            background: transparent;
            color: #da3633;
            text-decoration: none;
            border: 2px solid #da3633;
            border-radius: 6px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(218, 54, 51, 0.1);
        }

        .btn:hover {
            background: #da3633;
            color: #0b0c10;
            box-shadow: 0 0 25px rgba(218, 54, 51, 0.6);
            transform: scale(1.05);
        }

        /* Легкий ефект вуличного пилу на фоні */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, rgba(218,54,51,0.5), transparent),
                radial-gradient(1.5px 1.5px at 150px 170px, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 250px 80px, rgba(218,54,51,0.4), transparent);
            background-repeat: repeat;
            background-size: 300px 300px;
            opacity: 0.4;
        }
    </style>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
</head>
<body>
    <div class="particles"></div>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Глухий кут</h1>
        <p>Схоже, ви звернули не в той провулок. Цей маршрут більше не існує, або ви заїхали занадто далеко.</p>
        <a href="/index.html" class="btn">Повернутися на старт</a>
    </div>
</body>
</html>
