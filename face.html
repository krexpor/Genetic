<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор лица</title>
    <link rel="stylesheet" href="style.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WPCS9G55D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-0WPCS9G55D');
    </script>
    </head>
<body>
    <div class="calculator-card">
        <a href="index.html" class="back-link">⬅ Назад в меню</a>
        
        <h2>Конструктор лица</h2>
        <p class="subtitle">Узнайте вероятность наследования особых примет</p>
        <hr>
        
        <div class="input-group">
            <label>😊 Ямочки на щеках:</label>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <select id="dad-dimples" style="flex: 1;">
                    <option value="yes">Отец: Есть</option>
                    <option value="no" selected>Отец: Нет</option>
                </select>
                <select id="mom-dimples" style="flex: 1;">
                    <option value="yes">Мать: Есть</option>
                    <option value="no" selected>Мать: Нет</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>☀️ Веснушки:</label>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <select id="dad-freckles" style="flex: 1;">
                    <option value="yes">Отец: Есть</option>
                    <option value="no" selected>Отец: Нет</option>
                </select>
                <select id="mom-freckles" style="flex: 1;">
                    <option value="yes">Мать: Есть</option>
                    <option value="no" selected>Мать: Нет</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>🦸‍♂️ Ямочка на подбородке:</label>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <select id="dad-chin" style="flex: 1;">
                    <option value="yes">Отец: Есть</option>
                    <option value="no" selected>Отец: Нет</option>
                </select>
                <select id="mom-chin" style="flex: 1;">
                    <option value="yes">Мать: Есть</option>
                    <option value="no" selected>Мать: Нет</option>
                </select>
            </div>
        </div>

        <button onclick="calculateFace()">Собрать профиль</button>

        <div id="result-box" class="result-box" style="display: none;">
            <h3>Вероятность для ребенка:</h3>
            
            <div id="face-result" style="margin-top: 15px; font-size: 15px; font-weight: bold; line-height: 1.8; text-align: left; display: inline-block;">
                </div>

            <div id="fact-box" style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #444; text-align: left; font-size: 13px; color: #a0a0a0; line-height: 1.5;">
                <b style="color: #a855f7;">💡 Интересный факт:</b> <span id="fact-text"></span>
            </div>
        </div>
    </div>

    <script>
        // Функция расчета для доминантных признаков
        function getProbability(dad, mom) {
            if (dad === 'yes' && mom === 'yes') return "<span style='color: #10b981;'>Высокая (75-100%)</span>";
            if (dad === 'yes' || mom === 'yes') return "<span style='color: #f59e0b;'>Средняя (50%)</span>";
            return "<span style='color: #ef4444;'>Низкая (< 5%)</span>";
        }

        const faceFacts = [
            "Анатомически ямочки на щеках — это генетический дефект! Они появляются из-за раздвоения большой скуловой мышцы (Zygomaticus major). При улыбке кожа проваливается между двумя пучками этой мышцы.",
            "Ни один ребенок в мире не рождается с веснушками. Они проявляются только после того, как кожа впервые подвергается воздействию ультрафиолетовых лучей (солнца).",
            "Ямочка на подбородке образуется еще на стадии эмбриона, когда левая и правая половины челюстной кости (или мышцы) не срастаются до конца. Это абсолютно безопасная и очень красивая особенность.",
            "Доминантные гены не обязательно означают, что они самые частые. Например, наличие шести пальцев — это доминантный ген, но он встречается крайне редко, так как его почти нет в популяции."
        ];

        function calculateFace() {
            // Получаем данные
            const dDimples = document.getElementById("dad-dimples").value;
            const mDimples = document.getElementById("mom-dimples").value;
            
            const dFreckles = document.getElementById("dad-freckles").value;
            const mFreckles = document.getElementById("mom-freckles").value;
            
            const dChin = document.getElementById("dad-chin").value;
            const mChin = document.getElementById("mom-chin").value;

            // Формируем результат
            const resDimples = getProbability(dDimples, mDimples);
            const resFreckles = getProbability(dFreckles, mFreckles);
            const resChin = getProbability(dChin, mChin);

            document.getElementById("face-result").innerHTML = 
                "😊 <b>Ямочки на щеках:</b> " + resDimples + "<br>" +
                "☀️ <b>Веснушки:</b> " + resFreckles + "<br>" +
                "🦸‍♂️ <b>Ямочка на подбородке:</b> " + resChin;

            // Выбираем случайный факт
            const randomFact = faceFacts[Math.floor(Math.random() * faceFacts.length)];
            document.getElementById('fact-text').innerText = randomFact;

            // Показываем результат
            document.getElementById("result-box").style.display = "block";
        }
    </script>
</body>
</html>
